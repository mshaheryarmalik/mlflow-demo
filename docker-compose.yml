version: "3.9"

services:
  # ────────────────────────────────────────────
  # PostgreSQL — MLflow backend store
  # ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: mlflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mlflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mlflow}
      POSTGRES_DB: ${POSTGRES_DB:-mlflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mlflow}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ────────────────────────────────────────────
  # MinIO — S3-compatible artifact store
  # ────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: mlflow_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ────────────────────────────────────────────
  # MinIO bucket bootstrap (runs once)
  # ────────────────────────────────────────────
  minio-setup:
    image: minio/mc:latest
    container_name: mlflow_minio_setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
        mc mb --ignore-existing local/${MLFLOW_BUCKET_NAME:-mlflow-artifacts};
        mc anonymous set public local/${MLFLOW_BUCKET_NAME:-mlflow-artifacts};
        echo 'MinIO bucket ready.';
      "

  # ────────────────────────────────────────────
  # MLflow Tracking Server
  # ────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow_server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: >
      mlflow server
        --backend-store-uri postgresql://${POSTGRES_USER:-mlflow}:${POSTGRES_PASSWORD:-mlflow}@postgres:5432/${POSTGRES_DB:-mlflow}
        --default-artifact-root s3://${MLFLOW_BUCKET_NAME:-mlflow-artifacts}/
        --host 0.0.0.0
        --port 5000
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ────────────────────────────────────────────
  # Ollama — local LLM inference
  # ────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: mlflow_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Pull a small default model on first run
    # Override OLLAMA_MODEL in .env to change model
    entrypoint: >
      /bin/sh -c "
        ollama serve &
        sleep 5 &&
        ollama pull ${OLLAMA_MODEL:-llama3.2:1b} &&
        wait
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/version"]
      interval: 15s
      timeout: 10s
      retries: 10

volumes:
  postgres_data:
  minio_data:
  ollama_data:

networks:
  default:
    name: mlflow_network
